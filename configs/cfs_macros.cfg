# =============================================================================
# cfs_macros.cfg: Klipper macros for Creality Filament System (CFS)
# =============================================================================
#
# Include this file in printer.cfg with:
#   [include cfs_macros.cfg]
#
# TOPOLOGY (v1.4.0 -- this is the load-bearing fix over older versions of this
# file): a CFS is ONE controller on the RS485 bus (normally address 0x01 = BOX=1)
# with FOUR slots selected by a data-byte bitmask. Tools T0..T3 are SLOTS on that
# one controller (TOOL=0..3), NOT bus addresses. The old macros mapped T0->BOX=1,
# T1->BOX=2 etc., so on real hardware T1/T2/T3 addressed absent boxes and no-op'd.
# BOX= exists for multi-box DAISY-CHAINS (a second 4-slot unit at address 2) --
# a separate axis from tool slots; a chained setup has tools T0..T7 mapping to
# (BOX=1,TOOL=0..3) then (BOX=2,TOOL=0..3).
#
# Available G-code commands from the creality_cfs module:
#   CFS_INIT                       -- run the auto-addressing sequence
#   CFS_STATUS [BOX=<1-4>]         -- query box state (loaded/feeding + event channel)
#   CFS_VERSION [BOX=<1-4>]        -- query firmware version and serial number
#   CFS_FW_VERSION BOX=<1-4>       -- query 0xF0 firmware version string
#   CFS_EXTRUDE TOOL=<0-3> [BOX=] [TEMP=]  -- full sensor-gated load to the toolhead
#   CFS_RETRUDE TOOL=<0-3> [BOX=] [TEMP=]  -- full unload back into the CFS
#   CFS_CUT [BOX=] [TEMP=]         -- mechanical cut ram (needs cut geometry config)
#   CFS_FLUSH [LEN=|VOLUME=] [VELOCITY=] [TEMP=]  -- hotend purge with clog watchdog
#   CFS_SET_MODE BOX=<1-4> ...     -- raw box-mode frames (diagnostic)
#   CFS_SET_PRELOAD BOX= MASK= ENABLE=<0|1>  -- arm/disarm pre-loading (wire-correct)
#   CFS_ADDR_TABLE                 -- print the address assignment table
#
# TEMPERATURE NOTE (mainline Klipper): every load/unload/flush/cut blocks on M109
# to the module's extrude_temp (default 220) first. Set TEMP= per-material from
# your slicer's tool-change gcode if you need a different melt temperature.
# =============================================================================


# -----------------------------------------------------------------------------
# CFS_INITIALIZE: run the full auto-addressing sequence
# -----------------------------------------------------------------------------
# Wraps CFS_INIT with logging. Run manually after powering on the CFS hub (the
# module also auto-runs this at klippy:ready unless auto_init is disabled).
#
# Usage: CFS_INITIALIZE
[gcode_macro CFS_INITIALIZE]
description: Discover and assign RS485 addresses to all connected CFS boxes
gcode:
    RESPOND MSG="CFS: starting auto-addressing sequence..."
    CFS_INIT
    RESPOND MSG="CFS: auto-addressing complete. Check console for online count."


# -----------------------------------------------------------------------------
# CFS_CHECK_STATUS: query GET_BOX_STATE for all boxes
# -----------------------------------------------------------------------------
# Usage: CFS_CHECK_STATUS
[gcode_macro CFS_CHECK_STATUS]
description: Query GET_BOX_STATE for all CFS boxes and report results
gcode:
    RESPOND MSG="CFS: querying box states..."
    CFS_STATUS
    RESPOND MSG="CFS: status query complete."


# -----------------------------------------------------------------------------
# CFS_GET_VERSIONS: query GET_VERSION_SN for all boxes
# -----------------------------------------------------------------------------
# Usage: CFS_GET_VERSIONS
[gcode_macro CFS_GET_VERSIONS]
description: Query GET_VERSION_SN from all CFS boxes and report firmware versions
gcode:
    RESPOND MSG="CFS: querying firmware versions..."
    CFS_VERSION
    RESPOND MSG="CFS: version query complete."


# -----------------------------------------------------------------------------
# CFS_PRINT_START: call at the beginning of a multi-color print
# -----------------------------------------------------------------------------
# Verifies the box is online and ARMS pre-loading (wire phase 0x00 -- the
# start-of-print arm the stock host sends). Add to your START_PRINT macro.
#
# Usage: CFS_PRINT_START
[gcode_macro CFS_PRINT_START]
description: Prepare CFS for printing: verify online and arm pre-loading
gcode:
    RESPOND MSG="CFS: preparing for print..."
    CFS_CHECK_STATUS
    CFS_SET_PRELOAD BOX=1 MASK=15 ENABLE=1
    RESPOND MSG="CFS: ready for multi-color print."


# -----------------------------------------------------------------------------
# CFS_PRINT_END: call at the end of a multi-color print
# -----------------------------------------------------------------------------
# Unloads the ACTIVE tool (if any) back into its slot and DISARMS pre-loading
# (wire phase 0x01 -- the end-of-print disarm). The old version retracted "all
# boxes" at addresses 1..4, which addressed absent controllers.
#
# Usage: CFS_PRINT_END
[gcode_macro CFS_PRINT_END]
description: Post-print CFS cleanup: unload the active tool and disarm pre-loading
gcode:
    {% set active = printer["creality_cfs"].active_tool if "creality_cfs" in printer else -1 %}
    {% if active >= 0 %}
        RESPOND MSG="CFS: print end, unloading active tool T{active}..."
        CFS_RETRUDE TOOL={active}
    {% else %}
        RESPOND MSG="CFS: print end, no tool tracked as loaded."
    {% endif %}
    CFS_SET_PRELOAD BOX=1 MASK=15 ENABLE=0
    RESPOND MSG="CFS: ready for next print."


# -----------------------------------------------------------------------------
# CFS_ENABLE_PRELOAD / CFS_DISABLE_PRELOAD
# -----------------------------------------------------------------------------
# Pre-loading keeps the buffer tube staged for fast tool changes. ENABLE=1 arms
# (wire phase 0x00), ENABLE=0 disarms (phase 0x01) -- the module maps these to
# the correct wire bytes (v1.4.0 fixed an inversion here).
#
# Usage: CFS_ENABLE_PRELOAD / CFS_DISABLE_PRELOAD
[gcode_macro CFS_ENABLE_PRELOAD]
description: Arm pre-loading on all slots of the CFS controller
gcode:
    CFS_SET_PRELOAD BOX=1 MASK=15 ENABLE=1
    RESPOND MSG="CFS: pre-loading armed (all slots)."

[gcode_macro CFS_DISABLE_PRELOAD]
description: Disarm pre-loading on all slots of the CFS controller
gcode:
    CFS_SET_PRELOAD BOX=1 MASK=15 ENABLE=0
    RESPOND MSG="CFS: pre-loading disarmed (all slots)."


# =============================================================================
# Tool-change macros (T0 / T1 / T2 / T3)
# =============================================================================
#
# Called from slicer tool-change G-code (OrcaSlicer / SuperSlicer emit bare
# T0/T1/T2/T3). Each Tn selects SLOT n on the single CFS controller (BOX=1).
#
# Change sequence (the validated order from the reference implementation):
#   1. CUT the old filament at the toolhead (only if use_cut is enabled AND a
#      tool is currently loaded -- needs the cutter hardware + config).
#   2. CFS_RETRUDE the old tool: 0x11 START -> single E-15 pull -> FINISH,
#      complete when the toolhead filament switch clears.
#   3. CFS_EXTRUDE the new tool: sensor-gated feed until the switch trips.
#   4. CFS_FLUSH: purge the old color through the hotend (only if use_flush).
#
# Customize per-printer via the variables on _CFS_TOOL_CHANGE:
#   variable_use_cut:   1 if your printer has the filament cutter configured
#                       (cut_switch_pin + cut geometry in [creality_cfs]); else 0.
#                       WITHOUT a cutter you must ensure the filament tip is clean
#                       or the retract may jam at the 4-way splitter.
#   variable_use_flush: 1 to purge after each change (set your purge position
#                       in the slicer or a wrapper macro first); else 0.
#   variable_flush_volume: flush volume hint in mm^3 passed to CFS_FLUSH VOLUME=.
#
# Multi-box daisy-chains: duplicate these macros as T4..T7 with BOX=2.
# =============================================================================

[gcode_macro _CFS_TOOL_CHANGE]
description: Internal: switch to CFS slot TOOL on the controller. Called by T0..T3.
variable_active_tool: -1
variable_use_cut: 0
variable_use_flush: 0
variable_flush_volume: 0
gcode:
    {% set target = params.TOOL|int %}
    # The module's get_status() active_tool is the single source of truth (it also
    # tracks standalone CFS_EXTRUDE/CFS_RETRUDE calls this macro never sees); the
    # macro variable is only the fallback if the module object is unavailable.
    {% if "creality_cfs" in printer %}
        {% set prev = printer["creality_cfs"].active_tool %}
    {% else %}
        {% set prev = printer["gcode_macro _CFS_TOOL_CHANGE"].active_tool %}
    {% endif %}

    {% if prev == target %}
        RESPOND MSG="CFS: tool T{target} already active, skipping change"
    {% else %}
        RESPOND MSG="CFS: tool change T{prev} -> T{target}"

        {% if prev >= 0 %}
            {% if printer["gcode_macro _CFS_TOOL_CHANGE"].use_cut|int == 1 %}
                RESPOND MSG="CFS: cutting T{prev}..."
                CFS_CUT
            {% endif %}
            RESPOND MSG="CFS: unloading T{prev}..."
            CFS_RETRUDE TOOL={prev}
        {% endif %}

        RESPOND MSG="CFS: loading T{target}..."
        CFS_EXTRUDE TOOL={target}

        {% if printer["gcode_macro _CFS_TOOL_CHANGE"].use_flush|int == 1 %}
            {% set vol = printer["gcode_macro _CFS_TOOL_CHANGE"].flush_volume|int %}
            {% if vol > 0 %}
                CFS_FLUSH VOLUME={vol}
            {% else %}
                CFS_FLUSH
            {% endif %}
        {% endif %}

        SET_GCODE_VARIABLE MACRO=_CFS_TOOL_CHANGE VARIABLE=active_tool VALUE={target}
        RESPOND MSG="CFS: tool T{target} active"
    {% endif %}


[gcode_macro T0]
description: Select CFS slot A (tool 0)
gcode:
    _CFS_TOOL_CHANGE TOOL=0

[gcode_macro T1]
description: Select CFS slot B (tool 1)
gcode:
    _CFS_TOOL_CHANGE TOOL=1

[gcode_macro T2]
description: Select CFS slot C (tool 2)
gcode:
    _CFS_TOOL_CHANGE TOOL=2

[gcode_macro T3]
description: Select CFS slot D (tool 3)
gcode:
    _CFS_TOOL_CHANGE TOOL=3
