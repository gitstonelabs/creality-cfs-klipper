# =============================================================================
# cfs_macros.cfg: Klipper macros for Creality Filament System (CFS)
# =============================================================================
#
# Include this file in printer.cfg with:
#   [include cfs_macros.cfg]
#
# All filament load/retract commands (0x10 / 0x11) are fully implemented as
# of module v1.1.0. The T0/T1/T2/T3 macros below are wired up and ready for
# slicer integration.
#
# Available G-code commands from the creality_cfs module:
#   CFS_INIT                     -- run auto-addressing sequence
#   CFS_STATUS [BOX=<1-4>]       -- query box operating state
#   CFS_VERSION [BOX=<1-4>]      -- query firmware version and serial number
#   CFS_FW_VERSION BOX=<1-4>     -- query 0xF0 firmware version string
#   CFS_SET_MODE BOX=<1-4> MODE=<0-255> [PARAM=<0-255>]
#   CFS_SET_PRELOAD BOX=<1-4> MASK=<0-255> ENABLE=<0|1>
#   CFS_EXTRUDE BOX=<1-4>        -- load filament from CFS to toolhead
#   CFS_RETRUDE BOX=<1-4>        -- retract filament back into CFS box
#   CFS_ADDR_TABLE               -- print address assignment table
# =============================================================================


# -----------------------------------------------------------------------------
# CFS_INITIALIZE: run the full auto-addressing sequence
# -----------------------------------------------------------------------------
# Wraps CFS_INIT with logging. Use this in your START_PRINT macro or run
# manually after powering on the CFS hub.
#
# Usage: CFS_INITIALIZE
[gcode_macro CFS_INITIALIZE]
description: Discover and assign RS485 addresses to all connected CFS boxes
gcode:
    RESPOND MSG="CFS: starting auto-addressing sequence..."
    CFS_INIT
    RESPOND MSG="CFS: auto-addressing complete. Check console for online count."


# -----------------------------------------------------------------------------
# CFS_CHECK_STATUS: query GET_BOX_STATE for all boxes
# -----------------------------------------------------------------------------
# Polls the operating state register of every box (1 through box_count).
# Useful for a pre-print health check.
#
# Usage: CFS_CHECK_STATUS
[gcode_macro CFS_CHECK_STATUS]
description: Query GET_BOX_STATE for all CFS boxes and report results
gcode:
    RESPOND MSG="CFS: querying box states..."
    CFS_STATUS
    RESPOND MSG="CFS: status query complete."


# -----------------------------------------------------------------------------
# CFS_GET_VERSIONS: query GET_VERSION_SN for all boxes
# -----------------------------------------------------------------------------
# Reads the 22-byte firmware version and serial number string from each box.
# Run this after CFS_INITIALIZE to verify all boxes are responding correctly.
#
# Usage: CFS_GET_VERSIONS
[gcode_macro CFS_GET_VERSIONS]
description: Query GET_VERSION_SN from all CFS boxes and report firmware versions
gcode:
    RESPOND MSG="CFS: querying firmware versions..."
    CFS_VERSION
    RESPOND MSG="CFS: version query complete."


# -----------------------------------------------------------------------------
# CFS_PRINT_START: call at the beginning of a multi-color print
# -----------------------------------------------------------------------------
# Runs auto-addressing and verifies all boxes are online before starting.
# Add CFS_PRINT_START to your slicer's START_PRINT macro or print start hook.
#
# Usage: CFS_PRINT_START
[gcode_macro CFS_PRINT_START]
description: Prepare CFS for printing: initialize addressing and verify all boxes online
gcode:
    RESPOND MSG="CFS: preparing for print..."
    CFS_INITIALIZE
    CFS_CHECK_STATUS
    RESPOND MSG="CFS: ready for multi-color print."


# -----------------------------------------------------------------------------
# CFS_PRINT_END: call at the end of a multi-color print
# -----------------------------------------------------------------------------
# Retracts filament back into each CFS box after the print completes so the
# next print starts from a known empty-buffer state.
#
# Usage: CFS_PRINT_END
[gcode_macro CFS_PRINT_END]
description: Post-print CFS cleanup: retract filament back into each box
gcode:
    {% set count = printer["creality_cfs"].box_count if "creality_cfs" in printer else 4 %}
    RESPOND MSG="CFS: print end, retracting filament from all boxes..."
    {% for box in range(1, count + 1) %}
        CFS_RETRUDE BOX={box}
    {% endfor %}
    RESPOND MSG="CFS: filament retracted, ready for next print."


# -----------------------------------------------------------------------------
# CFS_ENABLE_PRELOAD: enable pre-loading for all slots on all boxes
# -----------------------------------------------------------------------------
# Sets slot mask 0x0F (all 4 slots) with enable=1 on each box.
# Pre-loading keeps the buffer tube filled for fast tool changes.
#
# Usage: CFS_ENABLE_PRELOAD
[gcode_macro CFS_ENABLE_PRELOAD]
description: Enable pre-loading on all slots of all CFS boxes
variable_box_count: 4
gcode:
    {% set count = printer["creality_cfs"].box_count if "creality_cfs" in printer else 4 %}
    {% for box in range(1, count + 1) %}
        CFS_SET_PRELOAD BOX={box} MASK=15 ENABLE=1
    {% endfor %}
    RESPOND MSG="CFS: pre-loading enabled on all boxes."


# -----------------------------------------------------------------------------
# CFS_DISABLE_PRELOAD: disable pre-loading on all boxes
# -----------------------------------------------------------------------------
# Usage: CFS_DISABLE_PRELOAD
[gcode_macro CFS_DISABLE_PRELOAD]
description: Disable pre-loading on all slots of all CFS boxes
gcode:
    {% set count = printer["creality_cfs"].box_count if "creality_cfs" in printer else 4 %}
    {% for box in range(1, count + 1) %}
        CFS_SET_PRELOAD BOX={box} MASK=15 ENABLE=0
    {% endfor %}
    RESPOND MSG="CFS: pre-loading disabled on all boxes."


# =============================================================================
# Tool-change macros (T0 / T1 / T2 / T3)
# =============================================================================
#
# These macros are designed to be called from slicer tool-change G-code.
# Each Tn selects box N+1 (T0 → box 1, T1 → box 2, etc.).
#
# Standard slicer convention: T0 / T1 / T2 / T3 with no parameters.
# OrcaSlicer / SuperSlicer will emit these between filament changes.
#
# Default behavior:
#   1. Retract any currently-loaded filament (calls CFS_RETRUDE on the
#      previously active box, stored in the `active_box` printer variable).
#   2. Run CFS_EXTRUDE on the new box to push filament to the toolhead.
#   3. Update `active_box` so the NEXT tool change retracts the right one.
#
# If you don't want auto-retract of the previous tool (e.g. you're using a
# splice/cut mechanism), override these macros with your own load-only flow.
#
# Customize per-printer:
#   - Add pre/post G-code (purge tower move, wipe, etc.) inside the macro body.
#   - Adjust temperatures if different filaments need different nozzle temps.
#
# =============================================================================

[gcode_macro _CFS_TOOL_CHANGE]
description: Internal: switch to box N. Called by T0..T3.
gcode:
    {% set target_box = params.BOX|int %}
    {% set prev_box = printer["gcode_macro _CFS_TOOL_CHANGE"].active_box %}

    {% if prev_box == target_box %}
        RESPOND MSG="CFS: tool {target_box} already active, skipping change"
    {% else %}
        RESPOND MSG="CFS: tool change {prev_box} -> {target_box}"

        {% if prev_box > 0 %}
            RESPOND MSG="CFS: retracting box {prev_box}..."
            CFS_RETRUDE BOX={prev_box}
        {% endif %}

        RESPOND MSG="CFS: loading box {target_box}..."
        CFS_EXTRUDE BOX={target_box}

        SET_GCODE_VARIABLE MACRO=_CFS_TOOL_CHANGE VARIABLE=active_box VALUE={target_box}
        RESPOND MSG="CFS: tool {target_box} active"
    {% endif %}
variable_active_box: 0


[gcode_macro T0]
description: Select CFS box 1
gcode:
    _CFS_TOOL_CHANGE BOX=1

[gcode_macro T1]
description: Select CFS box 2
gcode:
    _CFS_TOOL_CHANGE BOX=2

[gcode_macro T2]
description: Select CFS box 3
gcode:
    _CFS_TOOL_CHANGE BOX=3

[gcode_macro T3]
description: Select CFS box 4
gcode:
    _CFS_TOOL_CHANGE BOX=4
