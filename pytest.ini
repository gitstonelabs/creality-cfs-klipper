[pytest]
markers =
    unit: Unit tests — fast, no I/O, test isolated functions
    integration: Integration tests — use MockCFSHardware, test full workflows
    regression: Regression tests for documented bugs
    slow: Performance and stress tests (excluded from fast CI runs)

testpaths = tests
addopts = -v --tb=short
python_files = test_*.py
python_classes = Test*
python_functions = test_*
